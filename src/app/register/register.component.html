<div class="container">
  <form action="sesion" (ngSubmit)="onSubmit(userForm)" #userForm="ngForm">
    <section class="form-register">
      <h3>Registro</h3>
      <input
        class="controls"
        type="text"
        name="nombre"
        id="nombre"
        [(ngModel)]="newUser.nombre"
        placeholder="Ingrese su nombre"
        required
      />
      <input
        class="controls"
        type="text"
        name="apellidos"
        id="apellidos"
        placeholder="Ingrese su apellido"
        [(ngModel)]="newUser.apellidos"
        required
      />
      <input
        class="controls"
        type="number"
        name="edad"
        id="edad"
        placeholder="Ingrese su edad"
        min="1"
        required
        [(ngModel)]="newUser.edad"
      />
      <input
        class="controls"
        type="number"
        name="telefono"
        id="telefono"
        placeholder="Ingrese su numero telefónico"
        required
        [(ngModel)]="newUser.telefono"
      />
      <input
        class="controls"
        type="text"
        name="ubicacion"
        id="ubicacion"
        placeholder="Ingrese su ubicacion"
        required
        [(ngModel)]="newUser.ubicacion"
      />
      <input
        class="controls"
        type="email"
        name="correo"
        id="correo"
        placeholder="Ingrese su correo"
        required
        [(ngModel)]="newUser.correo"
      />
      <input
        class="controls"
        type="password"
        name="contrasenia"
        id="contrasenia"
        placeholder="Ingrese su Contraseña"
        [(ngModel)]="newUser.contrasena"
        required
      />
      <p>Estoy de acuerdo con <a href="#">Terminos y Condiciones</a></p>

      <a><input class="botons" type="submit" value="Registrar" /></a>

      <p><a routerLink="/login">¿Ya tengo cuenta?</a></p>
    </section>
  </form>
</div>
